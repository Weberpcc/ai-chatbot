<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Charan's AI Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #fff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .app {
            display: flex;
            width: 95vw;
            max-width: 1100px;
            height: 90vh;
            gap: 16px;
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            background: #1a1a1a;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 16px;
            background: #111;
            border-bottom: 1px solid #2a2a2a;
            font-size: 13px;
            font-weight: 600;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #history-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .history-item {
            padding: 10px 12px;
            background: #2a2a2a;
            border-radius: 8px;
            font-size: 12px;
            color: #ccc;
            cursor: pointer;
            border-left: 3px solid #6366f1;
            transition: background 0.2s;
        }

        .history-item:hover { background: #333; }

        .history-item .time {
            font-size: 10px;
            color: #555;
            margin-bottom: 4px;
        }

        .history-item .preview {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sidebar-footer {
            padding: 12px;
            border-top: 1px solid #2a2a2a;
        }

        .btn-clear {
            width: 100%;
            padding: 10px;
            background: #2a2a2a;
            color: #ff6b6b;
            border: 1px solid #ff6b6b33;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }

        .btn-clear:hover { background: #ff6b6b22; }

        /* Main chat */
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #1a1a1a;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }

        .header {
            padding: 20px 24px;
            background: #111;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .header-info h2 { font-size: 16px; font-weight: 600; }
        .header-info p { font-size: 12px; color: #22c55e; }

        .btn-save {
            padding: 8px 16px;
            background: #6366f133;
            color: #818cf8;
            border: 1px solid #6366f155;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }

        .btn-save:hover { background: #6366f155; }

        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scrollbar-width: thin;
            scrollbar-color: #333 transparent;
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 80%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message.ai { align-self: flex-start; }

        .msg-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .message.user .msg-icon { background: #6366f1; }
        .message.ai .msg-icon { background: #2a2a2a; }

        .msg-bubble {
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.6;
        }

        .message.user .msg-bubble {
            background: #6366f1;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.ai .msg-bubble {
            background: #2a2a2a;
            color: #e5e5e5;
            border-bottom-left-radius: 4px;
        }

        .typing {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: #2a2a2a;
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            width: fit-content;
        }

        .typing span {
            width: 8px;
            height: 8px;
            background: #666;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        .input-area {
            padding: 16px 24px;
            background: #111;
            border-top: 1px solid #2a2a2a;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        #user-input {
            flex: 1;
            padding: 12px 18px;
            background: #2a2a2a;
            border: 1px solid #333;
            border-radius: 24px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
        }

        #user-input:focus { border-color: #6366f1; }
        #user-input::placeholder { color: #555; }

        button.send-btn {
            width: 44px;
            height: 44px;
            background: #6366f1;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.1s;
            flex-shrink: 0;
        }

        button.send-btn:hover { background: #4f46e5; transform: scale(1.05); }
        button.send-btn:active { transform: scale(0.95); }
        button.send-btn svg { width: 18px; height: 18px; fill: white; }

        .empty-history {
            text-align: center;
            color: #444;
            font-size: 12px;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">💬 History</div>
            <div id="history-list">
                <div class="empty-history">No saved chats yet</div>
            </div>
            <div class="sidebar-footer">
                <button class="btn-clear" onclick="clearChat()">🗑 Clear Chat</button>
            </div>
        </div>

        <!-- Main Chat -->
        <div class="container">
            <div class="header">
                <div class="header-left">
                    <div class="avatar">🤖</div>
                    <div class="header-info">
                        <h2>Charan's AI Assistant</h2>
                        <p>● Online</p>
                    </div>
                </div>
                <button class="btn-save" onclick="saveChat()">💾 Save Chat</button>
            </div>

            <div id="chat-box">
                <div class="message ai">
                    <div class="msg-icon">🤖</div>
                    <div class="msg-bubble">Hey Charan! I'm your AI assistant. What can I help you with today?</div>
                </div>
            </div>

            <div class="input-area">
                <input type="text" id="user-input" placeholder="Message your AI..."
                    onkeypress="if(event.key==='Enter') sendMessage()"/>
                <button class="send-btn" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentChat = [];

        async function sendMessage() {
            const input = document.getElementById("user-input");
            const message = input.value.trim();
            if (!message) return;

            addMessage(message, "user");
            currentChat.push({ sender: "user", text: message, time: new Date().toLocaleTimeString() });
            input.value = "";

            const typing = showTyping();

            try {
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: message })
                });
                const data = await response.json();
                typing.remove();
                addMessage(data.reply, "ai");
                currentChat.push({ sender: "ai", text: data.reply, time: new Date().toLocaleTimeString() });
            } catch {
                typing.remove();
                addMessage("Something went wrong. Try again.", "ai");
            }
        }

        function addMessage(text, sender) {
            const chatBox = document.getElementById("chat-box");
            const div = document.createElement("div");
            div.className = `message ${sender}`;
            div.innerHTML = `
                <div class="msg-icon">${sender === "user" ? "👤" : "🤖"}</div>
                <div class="msg-bubble">${text}</div>
            `;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function showTyping() {
            const chatBox = document.getElementById("chat-box");
            const div = document.createElement("div");
            div.className = "message ai";
            div.innerHTML = `
                <div class="msg-icon">🤖</div>
                <div class="typing"><span></span><span></span><span></span></div>
            `;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div;
        }

        function clearChat() {
            if (!confirm("Clear this chat?")) return;
            document.getElementById("chat-box").innerHTML = `
                <div class="message ai">
                    <div class="msg-icon">🤖</div>
                    <div class="msg-bubble">Chat cleared. How can I help you?</div>
                </div>
            `;
            currentChat = [];
            fetch("/clear", { method: "POST" });
        }

        function saveChat() {
            if (currentChat.length === 0) {
                alert("Nothing to save yet!");
                return;
            }
            fetch("/save", { method: "POST" })
                .then(r => r.json())
                .then(data => {
                    addToHistory(data.filename);
                    alert("Chat saved: " + data.filename);
                });
        }

        function addToHistory(filename) {
            const list = document.getElementById("history-list");
            const empty = list.querySelector(".empty-history");
            if (empty) empty.remove();

            const item = document.createElement("div");
            item.className = "history-item";
            item.innerHTML = `
                <div class="time">${new Date().toLocaleTimeString()}</div>
                <div class="preview">${filename}</div>
            `;
            list.prepend(item);
        }
    </script>
</body>
</html>
